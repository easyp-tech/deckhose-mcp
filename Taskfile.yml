version: "3"

vars:
  BINARY_NAME: deckhouse-harness
  IMAGE_NAME: deckhouse-mcp
  NAMESPACE: d8-system

tasks:
  generate:
    desc: Download proto deps and generate code
    cmds:
      - easyp mod download
      - easyp generate

  lint:
    desc: Lint proto files
    cmds:
      - easyp lint

  build:
    desc: Build Go binary
    cmds:
      - go build -o {{.BINARY_NAME}} ./cmd/deckhouse-harness

  test:
    desc: Run unit tests
    cmds:
      - go test ./...

  integration:setup:
    desc: Set up integration test environment (Kind + Deckhouse CE + build binary)
    cmds:
      - bash tests/integration/setup.sh

  integration:test:
    desc: Run integration tests
    cmds:
      - bash tests/integration/test.sh

  integration:teardown:
    desc: Tear down integration test environment
    cmds:
      - bash tests/integration/teardown.sh

  docker:build:
    desc: Build Docker image
    cmds:
      - docker build -t {{.IMAGE_NAME}}:local .

  docker:load:
    desc: Load Docker image into Kind cluster
    cmds:
      - kind load docker-image {{.IMAGE_NAME}}:local --name d8

  integration:
    desc: Run full integration test cycle
    cmds:
      - task: integration:setup
      - task: integration:test
      - task: integration:teardown
